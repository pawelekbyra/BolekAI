name = "kulfon"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "bolek-memory"
database_id = "1f8cdeb5-6f31-4027-8dda-d1a4d6ab5a26"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "8683744b08e3472ca144d7fb3b646a1c"

# Semantic memory — vector recall (bge-m3, 1024 dims, cosine).
# Create once:  wrangler vectorize create bolek-semantic-memory --dimensions=1024 --metric=cosine
[[vectorize]]
binding = "MEMORY"
index_name = "bolek-semantic-memory"

[vars]
AI_MODEL = "@cf/meta/llama-3.2-3b-instruct"

[triggers]
crons = ["* * * * *"]
